name: Generate Snake Animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

concurrency:
  group: profile-readme-assets
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate stable profile cards
        run: python3 .github/scripts/generate_profile_cards.py
        env:
          GITHUB_USERNAME: coattail
          CARD_TIMEZONE: Asia/Shanghai
          DIST_DIR: dist

      - name: Generate snake svg files
        uses: Platane/snk@v3
        with:
          github_user_name: coattail
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
