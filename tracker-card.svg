<svg xmlns="http://www.w3.org/2000/svg" width="580" height="280" viewBox="0 0 580 280" role="img" aria-labelledby="title desc">
  <title id="title">Tracker card</title>
  <desc id="desc">Animated project card featuring multi-asset and 13F tracker style visuals.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1320"/>
      <stop offset="100%" stop-color="#16253a"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#68e2d2"/>
      <stop offset="100%" stop-color="#2f8ea1"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8fb8ff"/>
      <stop offset="100%" stop-color="#4468c8"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8b1ff"/>
      <stop offset="100%" stop-color="#8661bf"/>
    </linearGradient>
    <style>
      .ui { font-family: 'Avenir Next', 'Segoe UI', Arial, sans-serif; }
      .col { transform-box: fill-box; transform-origin: center bottom; animation: bounce 4.8s ease-in-out infinite; }
      .c2 { animation-delay: 0.45s; }
      .c3 { animation-delay: 0.9s; }
      .c4 { animation-delay: 1.35s; }
      .glow { animation: glow 2.6s ease-in-out infinite; }
      .route { fill: none; stroke: #8bb8ff; stroke-width: 2.4; stroke-linecap: round; stroke-dasharray: 210; stroke-dashoffset: 210; animation: route 6.5s ease-in-out infinite; }
      @keyframes bounce {
        0%, 100% { transform: scaleY(0.9); opacity: 0.78; }
        50% { transform: scaleY(1); opacity: 1; }
      }
      @keyframes glow {
        0%, 100% { opacity: 0.35; }
        50% { opacity: 1; }
      }
      @keyframes route {
        0% { stroke-dashoffset: 210; opacity: 0.1; }
        35% { stroke-dashoffset: 0; opacity: 1; }
        70% { stroke-dashoffset: 0; opacity: 0.75; }
        100% { stroke-dashoffset: -210; opacity: 0.08; }
      }
    </style>
  </defs>

  <rect width="580" height="280" rx="24" fill="url(#bg)"/>
  <rect x="24" y="24" width="532" height="232" rx="18" fill="#0d1a2c" stroke="#28425f"/>
  <text x="46" y="58" class="ui" fill="#8ca8c4" font-size="12" letter-spacing="1.4">FEATURED PROJECTS</text>
  <text x="46" y="92" class="ui" fill="#edf4ff" font-size="28" font-weight="700">Multi-Asset + 13F Tracker</text>
  <text x="46" y="120" class="ui" fill="#9eb0c6" font-size="16">Cross-asset regimes, housing cycles, and institutional holdings in one research toolkit.</text>

  <g>
    <rect x="46" y="158" width="212" height="78" rx="14" fill="#11253c" stroke="#2b4764"/>
    <text x="64" y="184" class="ui" fill="#8edbff" font-size="13" font-weight="700">Multi-Asset-Dashboard</text>
    <rect x="68" y="206" width="18" height="14" rx="4" fill="url(#teal)" class="col"/>
    <rect x="94" y="192" width="18" height="28" rx="4" fill="url(#blue)" class="col c2"/>
    <rect x="120" y="170" width="18" height="50" rx="4" fill="url(#violet)" class="col c3"/>
    <rect x="146" y="183" width="18" height="37" rx="4" fill="url(#teal)" class="col c4"/>
    <circle cx="224" cy="198" r="7" fill="#68e2d2" class="glow"/>
    <circle cx="224" cy="218" r="7" fill="#8fb8ff" class="glow" style="animation-delay:0.9s"/>
  </g>

  <g>
    <rect x="280" y="158" width="248" height="78" rx="14" fill="#11253c" stroke="#2b4764"/>
    <text x="298" y="184" class="ui" fill="#8edbff" font-size="13" font-weight="700">guru-13f-monitor</text>
    <path d="M 302 216 C 326 202, 350 194, 376 194 C 404 194, 420 208, 446 208 C 470 208, 486 194, 510 182" class="route"/>
    <circle cx="376" cy="194" r="5" fill="#8fb8ff" class="glow"/>
    <circle cx="446" cy="208" r="5" fill="#68e2d2" class="glow" style="animation-delay:0.8s"/>
    <circle cx="510" cy="182" r="5" fill="#d8b1ff" class="glow" style="animation-delay:1.6s"/>
  </g>
</svg>
